<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MizP</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">
    <!-- Javascript -->
    <script defer src="/js/script.js"></script>
    <!-- CSS -->
    <link rel="stylesheet" href="/css/style.css">
  </head>
  <body>
    <header class="container-fluid">
      <div class="row">
        <div class="col-xl-4">
          <ul class="d-flex">
            <div class="mt-1">
              <img src="/img/logo/mipz.png" class="m-0" width="120px" height="auto" alt="MizP - O seu ecommerce" title="MIZP - O seu ecommerce">
            </div> 
            <div class="mt-4 d-flex">
              <li><a class="navLink ms-3" href="#mais-vendidos">Mais vendidos</a></li>
              <li><a class="navLink ms-4" href="#">Lançamentos</a></li>
            </div>   
          </ul>
        </div>
        <div class="col-xl-8 p-0 d-flex">
          <button class="btn pb-0"><i id="tecnologia" class="bi bi-gear-wide-connected fs-1 estilo" title="Tecnologia"></i></button>
          <button class="btn pb-0"><i id="casa" class="bi bi-house-door fs-1 estilo" title="Casa"></i></button>
          <button class="btn pb-0"><i id="ferramentas" class="bi bi-wrench fs-1 estilo" title="Ferramentas"></i></button>
          <button class="btn pb-0"><i id="moda" class="bi bi-person-check fs-1 estilo" title="Moda"></i></button>
          <button class="btn pb-0"><i id="produtos_beleza" class="bi bi-brush fs-1 estilo" title="Produtos de Beleza"></i></button>
          <button class="btn pb-0"><i id="brinquedos" class="bi bi-star fs-1 estilo" title="Brinquegos"></i></button>
          <input type="text" id="text" class="text-start ms-4 fs-3"/>
        </div>          
      </div>
      
      <!-- pesquisa -->
      <div class="row d-flex mt-2">
        <div class="col-xl-7">
          <input type="text" class="inputPesquisar" placeholder="Pesquisar produtos" />
        </div>
        <div class="col-xl-2">
          <button class="btnPesquisar">Pesquisar</button>
        </div>
      </div>
    </header>

    <!-- carrossel -->
    <div class="container-fluid mt-4" style="height: 480px;">
      <div id="carouselExampleCaptions" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-indicators">
          <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
          <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="1" aria-label="Slide 2"></button>
          <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="2" aria-label="Slide 3"></button>
        </div>
        <div class="carousel-inner">
          <div class="carousel-item active">
            <img src="/img/carrossel/not.jpg" class="d-block w-100" alt="..." height="465px">
            <div class="carousel-caption d-none d-md-block">
              <h5>Notebooks</h5>
              <p>Temos notebooks de todas as marcas e modelos</p>
              <button class="btn btn-ligth conferir">Confira</button>
            </div>
          </div>
          <div class="carousel-item">
            <img src="/img/carrossel/black.jpg" class="d-block w-100" alt="..." height="465px">
            <div class="carousel-caption d-none d-md-block">
              <br>
              <br>
              <p class="black-friday">Está chegando! Toda a loja com 70% de desconto! Dia 27.08.2021. Não perca!!!</p>
            </div>
          </div>
          <div class="carousel-item">
            <img src="/img/carrossel/smart_whatches.jpg" class="d-block w-100" alt="..." height="465px">
            <div class="carousel-caption d-none d-md-block">
              <h5>Smart Whatches</h5>
              <p class="smart-whatches">Novos modelos de várias marcas e com preços imbativeis!</p>
              <button class="btn btn-ligth conferir">Confira</button>
            </div>
          </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide="prev">
          <span class="carousel-control-prev-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Previous</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide="next">
          <span class="carousel-control-next-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Next</span>
        </button>
      </div>
      <!-- section mais vendidos -->
      <h3 id="mais-vendidos">Os produtos mais vendidos</h3>
      <section>
        <div class="row section-mais-vendidos">


        </div>
      </section>
    </div>
  </body>
  </html>
